<!DOCTYPE html>
<html lang="de">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Statistik – Food Tracker</title>
    <link rel="icon" href="img/favicon.svg" type="image/svg+xml">
    <link rel="stylesheet" href="css/style.css?v=4a5f8361">
</head>

<body>
    <h1>Statistik</h1>

    <div id="range-toggle" class="range-toggle">
        <button type="button" class="subtle" data-range="7">7 Tage</button>
        <button type="button" class="subtle active" data-range="30">30 Tage</button>
        <button type="button" class="subtle" data-range="all">Alle</button>
    </div>

    <p id="empty" class="muted hidden">Noch keine erfassten Tage. Trage im Tracker etwas ein, dann erscheinen hier deine Auswertungen.</p>

    <div id="content">
        <section class="section">
            <h2 id="summary-heading">Überblick</h2>
            <div id="summary-grid" class="stat-grid"></div>
        </section>

        <section class="section">
            <h2>Ø Makro-Verteilung (nach kcal)</h2>
            <div id="macro-chart"></div>
        </section>

        <section class="section">
            <h2>Kalorien pro Tag</h2>
            <div id="kcal-chart"></div>
        </section>

        <section class="section">
            <h2>Fett pro Tag</h2>
            <div id="fat-chart"></div>
        </section>

        <section class="section">
            <h2>Kohlenhydrate pro Tag</h2>
            <div id="carb-chart"></div>
        </section>

        <section class="section">
            <h2>Eiweiß pro Tag</h2>
            <div id="protein-chart"></div>
        </section>
    </div>

    <button class="danger mt hidden" id="reset-btn">Alle erfassten Tage zurücksetzen</button>

    <footer>
        <a href="index.html">Tracker</a>
        <a href="products.html">Produkte</a>
        <a href="statistics.html" class="current">Statistik</a>
        <a href="terms.html">Terms</a>
    </footer>

    <dialog id="confirm-dialog">
        <p id="confirm-message"></p>
        <div class="confirm-actions">
            <button id="confirm-cancel" type="button">Abbrechen</button>
            <button id="confirm-ok" type="button">OK</button>
        </div>
    </dialog>

    <script src="js/common.js?v=61c5fac4"></script>
    <script src="js/statistics.js?v=32b69c0f"></script>

</body>

</html>
