<!DOCTYPE html>
<html lang="de">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Produkte – Food Tracker</title>
    <link rel="icon" href="img/favicon.svg" type="image/svg+xml">
    <link rel="stylesheet" href="css/style.css?v=4a5f8361">
</head>

<body>
    <h1>Produkte</h1>

    <section class="section">
        <h2 id="custom-heading">Meine Produkte</h2>
        <div id="custom-list"></div>
        <button class="subtle mt hidden" id="export-custom-btn">Produkte exportieren</button>
        <div id="export-area" class="hidden mt">
            <textarea id="export-text" readonly rows="8" spellcheck="false"></textarea>
            <button class="subtle" id="copy-export-btn">In Zwischenablage kopieren</button>
        </div>
        <button class="danger mt hidden" id="delete-custom-btn">Alle eigenen Produkte löschen</button>
    </section>

    <section class="section">
        <h2 id="global-heading">Globale Produkte</h2>
        <div id="global-list"></div>
    </section>

    <footer>
        <a href="index.html">Tracker</a>
        <a href="products.html" class="current">Produkte</a>
        <a href="statistics.html">Statistik</a>
        <a href="terms.html">Terms</a>
    </footer>

    <dialog id="confirm-dialog">
        <p id="confirm-message"></p>
        <div class="confirm-actions">
            <button id="confirm-cancel" type="button">Abbrechen</button>
            <button id="confirm-ok" type="button">OK</button>
        </div>
    </dialog>

    <script src="js/common.js?v=61c5fac4"></script>
    <script src="js/products.js?v=d379e2fb"></script>
    <script src="js/products-page.js?v=871307c1"></script>

</body>

</html>
